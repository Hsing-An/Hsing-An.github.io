      about:
        enable: true
        title: "About"
        image: "/images/me.webp"
        content: |-
          ## Hsing-An Lee: Recorder Player / Composer

          Born in Taiwan, graduated from the Department of Music at National Tsing Hua University, majoring in **recorder** and minoring in **composition**. Studied recorder with Meng-Heng Chen and composition with Hsin-Lei Chen and Chiu-Yu Chou.

          Focused on early music and contemporary music in recorder performance, while continuing to study jazz music.  
          [Recipient of awards in international competitions](#achievements), with appearances as a **soloist** at the [**National Recital Hall** and the **National Taichung Theater**](#experience).

          As a composer, drawing from electronic music, jazz music, contemporary music, popular music, and traditional music.  
          Writing includes instrumental compositions as well as arrangements produced with music software. [Awarded compositions](#achievements) have also been [presented at Weiwuying](https://www.opentix.life/event/1985188449916014593).

          ---

