  # About
  about:
    enable: true
    title: "關於我"
    image: "/images/me.webp"
    content: |-
      ## 李倖安(Hsing-An Lee) 木笛演奏家/作曲家

      出生於台東，畢業於清華大學音樂系，主修**木笛**、副修**作曲**。師事陳孟亨（木笛）與陳欣蕾、周久渝（作曲）。
      
      **木笛演奏**主要專注於古樂以及當代音樂，目前也持續鑽研爵士樂。  
      [曾多次在國際賽事上獲獎](#achievements)，並曾作為**獨奏家**在[**國家演奏廳**、**台中歌劇院**](#experience)演出。 

      **作曲**方面則融合了電子、爵士、當代、流行、傳統音樂等的影響，使得創作的語彙十分多元。  
