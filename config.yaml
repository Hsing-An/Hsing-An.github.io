  customCSS: true

  customScripts: |-
    <script>
      (() => {
        const lightLogo = "/images/logo.webp";
        const darkLogo = "/images/logo-white.webp";

        const updateThemeAssets = () => {
          const currentLogo = document.body.classList.contains("dark") ? darkLogo : lightLogo;
          document
            .querySelectorAll(".navbar-brand img, .footer-logo")
            .forEach((logo) => {
              logo.src = currentLogo;
            });
        };

        document.addEventListener("DOMContentLoaded", () => {
          updateThemeAssets();
          new MutationObserver(updateThemeAssets).observe(document.body, {
            attributes: true,
            attributeFilter: ["class"]
          });
        });
      })();
    </script>
